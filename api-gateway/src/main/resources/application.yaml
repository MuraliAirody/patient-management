server:
  port:4004

spring:
  cloud:
    gateway:
      routes:
        - # Route for /api/patients/** to patient-service
          # REST CLIENT -> http://localhost:4004/api/patient/getPatients
          # API GATEWAY -> http://patient-service:4000/patient/getPatients
          # PATIENT SERVICE (spring boot app) -> /patient/getPatients -> patient array
        - id: patient-service-route
          uri: http://patient-service:4000
          predicate:
            - path=/api/patient/**
          filters:
            - StripPrefix=1

        - # REST CLIENT -> http://localhost:4004/api-docs/patients
          # API GATEWAY -> http://patient-service:4000/v3/api-docs

        - id: api-docs-patient-service
          uri: http://patient-serice:4000
          predicate:
            -  path=/api-docs/patients
          filters:
            -  rewrite-path=/api-docs/patients,/v3/api-docs